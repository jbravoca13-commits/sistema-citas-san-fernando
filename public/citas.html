
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citas - Sistema de Citas Médicas</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body data-modulo="citas">

  <header>
    <div class="encabezado">

      <div class="marca">
        <h1>Sistema web de citas médicas</h1>
        <p>Posta Médica San Fernando - SJL</p>
      </div>

      <nav>
        <a href="index.html">Inicio</a>
        <a href="pacientes.html">Pacientes</a>
        <a href="medicos.html">Médicos</a>
        <a href="horarios.html">Horarios</a>
        <a href="citas.html" class="activo">Citas</a>
      </nav>

    </div>
  </header>

  <main>

    <div id="mensaje" class="mensaje"></div>

    <section class="titulo-modulo">
      <h2>Módulo de citas</h2>
      <p>Programación y consulta de citas médicas.</p>
    </section>

    <section class="panel-modulo">

      <div class="card">

        <h3>Programar cita</h3>

        <form id="formCita">

          <select id="citaPaciente" required>
            <option value="">Cargando pacientes...</option>
          </select>

          <select id="citaMedico" required>
            <option value="">Cargando médicos...</option>
          </select>

          <select id="citaHorario" required>
            <option value="">Cargando horarios...</option>
          </select>

          <input
            type="date"
            id="citaFecha"
            required
          >

          <input
            type="time"
            id="citaHora"
            required
          >

          <select id="citaEstado" required>
            <option value="Pendiente">Pendiente</option>
            <option value="Atendida">Atendida</option>
            <option value="Cancelada">Cancelada</option>
          </select>

          <button type="submit">
            Guardar cita
          </button>

        </form>

      </div>

      <div class="card">

        <h3>Citas registradas</h3>

        <div class="acciones-tabla">

          <button
            type="button"
            onclick="cargarCitas()"
          >
            Actualizar datos
          </button>

        </div>

        <div class="tabla-contenedor">

          <table>

            <thead>
              <tr>
                <th>ID</th>
                <th>Paciente</th>
                <th>Médico</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Estado</th>
              </tr>
            </thead>

            <tbody id="tablaCitas"></tbody>

          </table>

        </div>

      </div>

    </section>

  </main>

  <script src="app.js"></script>

</body>
</html>
