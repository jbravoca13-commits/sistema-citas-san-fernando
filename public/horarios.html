
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horarios - Sistema de Citas Médicas</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body data-modulo="horarios">

  <header>
    <div class="encabezado">

      <div class="marca">
        <h1>Sistema web de citas médicas</h1>
        <p>Posta Médica San Fernando - SJL</p>
      </div>

      <nav>
        <a href="index.html">Inicio</a>
        <a href="pacientes.html">Pacientes</a>
        <a href="medicos.html">Médicos</a>
        <a href="horarios.html" class="activo">Horarios</a>
        <a href="citas.html">Citas</a>
      </nav>

    </div>
  </header>

  <main>

    <div id="mensaje" class="mensaje"></div>

    <section class="titulo-modulo">
      <h2>Módulo de horarios</h2>
      <p>Registro y consulta de la disponibilidad médica.</p>
    </section>

    <section class="panel-modulo">

      <div class="card">

        <h3>Registrar horario</h3>

        <form id="formHorario">

          <select id="horarioMedico" required>
            <option value="">Cargando médicos...</option>
          </select>

          <input
            type="date"
            id="horarioFecha"
            required
          >

          <input
            type="time"
            id="horaInicio"
            required
          >

          <input
            type="time"
            id="horaFin"
            required
          >

          <button type="submit">
            Guardar horario
          </button>

        </form>

      </div>

      <div class="card">

        <h3>Horarios registrados</h3>

        <div class="acciones-tabla">

          <button
            type="button"
            onclick="cargarHorarios()"
          >
            Actualizar datos
          </button>

        </div>

        <div class="tabla-contenedor">

          <table>

            <thead>
              <tr>
                <th>ID</th>
                <th>Médico</th>
                <th>Fecha</th>
                <th>Hora de inicio</th>
                <th>Hora de fin</th>
                <th>Estado</th>
              </tr>
            </thead>

            <tbody id="tablaHorarios"></tbody>

          </table>

        </div>

      </div>

    </section>

  </main>

  <script src="app.js"></script>

</body>
</html>
