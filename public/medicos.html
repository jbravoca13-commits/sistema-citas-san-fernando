
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Médicos - Sistema de Citas Médicas</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body data-modulo="medicos">

  <header>
    <div class="encabezado">

      <div class="marca">
        <h1>Sistema web de citas médicas</h1>
        <p>Posta Médica San Fernando - SJL</p>
      </div>

      <nav>
        <a href="index.html">Inicio</a>
        <a href="pacientes.html">Pacientes</a>
        <a href="medicos.html" class="activo">Médicos</a>
        <a href="horarios.html">Horarios</a>
        <a href="citas.html">Citas</a>
      </nav>

    </div>
  </header>

  <main>

    <div id="mensaje" class="mensaje"></div>

    <section class="titulo-modulo">
      <h2>Módulo de médicos</h2>
      <p>Registro y consulta de profesionales de salud.</p>
    </section>

    <section class="panel-modulo">

      <div class="card">

        <h3>Registrar médico</h3>

        <form id="formMedico">

          <input
            type="text"
            id="medicoNombres"
            placeholder="Nombres"
            required
          >

          <input
            type="text"
            id="medicoApellidos"
            placeholder="Apellidos"
            required
          >

          <select id="medicoEspecialidad" required>
            <option value="">Cargando especialidades...</option>
          </select>

          <input
            type="text"
            id="medicoCmp"
            placeholder="CMP"
          >

         
            <input
            type="text"
            id="pacienteTelefono"
            placeholder="Teléfono"
             maxlength="9"
            minlength="9"
              pattern="[0-9]{9}"
             inputmode="numeric"
             title="El teléfono debe contener exactamente 9 números"
            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
            >



          <button type="submit">
            Guardar médico
          </button>

        </form>

      </div>

      <div class="card">

        <h3>Médicos registrados</h3>

        <div class="acciones-tabla">

          <button
            type="button"
            onclick="cargarMedicos()"
          >
            Actualizar datos
          </button>

        </div>

        <div class="tabla-contenedor">

          <table>

            <thead>
              <tr>
                <th>ID</th>
                <th>Nombres</th>
                <th>Apellidos</th>
                <th>Especialidad</th>
                <th>CMP</th>
                <th>Teléfono</th>
              </tr>
            </thead>

            <tbody id="tablaMedicos"></tbody>

          </table>

        </div>

      </div>

    </section>

  </main>

  <script src="app.js"></script>

</body>
</html>
